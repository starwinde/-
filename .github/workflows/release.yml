# Builds an APK and publishes it as a GitHub Release asset
# whenever a tag matching `v*` is pushed.
#
# Trigger:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Output:
#   GitHub Releases page gets a new release `v0.1.0` with an APK attached
#   (`routinemon-v0.1.0-release.apk` if release build worked, else
#   `routinemon-v0.1.0-debug.apk`). Direct download URL:
#   https://github.com/<owner>/<repo>/releases/download/v0.1.0/<filename>

name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK + NDK (sqlite3_flutter_libs needs native libs)
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973'

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show toolchain versions
        run: |
          flutter --version
          dart --version
          java -version
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME/ndk" 2>/dev/null || echo "(no ndk dir)"

      - name: Get dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze (advisory)
        run: flutter analyze || true

      # Try debug first — debug APKs are most likely to succeed on first CI
      # build with native deps. We can switch to release-only after we
      # verify the pipeline works.
      #
      # CRITICAL: do NOT pipe build output into `tail`. The previous run
      # (25646198432) failed in 6 seconds because `set -o pipefail | tail -400`
      # SIGPIPE'd the flutter process before it could even start gradle.
      # Stream full output; GitHub Actions UI collapses long logs anyway.
      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      # CRITICAL: android/local.properties is gitignored (correct), but
      # settings.gradle.kts reads it at the very first gradle invocation
      # to find the Flutter SDK. Without it, the build dies in <10s before
      # gradle can even print a real error. Generate it from CI env vars.
      - name: Generate android/local.properties for CI
        run: |
          FLUTTER_BIN=$(which flutter)
          FLUTTER_SDK=$(dirname "$(dirname "$(readlink -f "$FLUTTER_BIN")")")
          echo "Detected Flutter SDK: $FLUTTER_SDK"
          echo "Detected Android SDK: $ANDROID_HOME"
          cat > android/local.properties <<EOF
          sdk.dir=$ANDROID_HOME
          flutter.sdk=$FLUTTER_SDK
          flutter.buildMode=debug
          flutter.versionName=$(grep "^version:" pubspec.yaml | sed -E 's/version: *([0-9.]+).*/\1/')
          flutter.versionCode=$(grep "^version:" pubspec.yaml | sed -E 's/.*\+([0-9]+).*/\1/')
          EOF
          cat android/local.properties

      # Diagnostic: confirm gradle wrapper works at all
      - name: Gradle wrapper sanity check
        run: |
          cd android
          ./gradlew --version 2>&1 || echo "gradlew failed with exit $?"

      # Capture stdout+stderr to a file via redirection — NO pipes (avoids
      # the SIGPIPE issue) and NO --verbose (sometimes breaks buffering).
      # On failure, we tee the tail into GITHUB_STEP_SUMMARY and upload
      # the full log as artifact, so we can debug WITHOUT admin log access.
      - name: Build debug APK
        id: build_debug
        continue-on-error: true
        run: |
          mkdir -p /tmp/buildlogs
          set +e
          flutter build apk --debug > /tmp/buildlogs/debug.log 2>&1
          EXIT=$?
          echo "## Debug build exit: $EXIT" >> "$GITHUB_STEP_SUMMARY"
          echo '<details><summary>last 200 lines</summary>' >> "$GITHUB_STEP_SUMMARY"
          echo '' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -200 /tmp/buildlogs/debug.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo '</details>' >> "$GITHUB_STEP_SUMMARY"
          tail -100 /tmp/buildlogs/debug.log
          exit $EXIT

      - name: Try release APK (best-effort)
        id: build_release
        if: steps.build_debug.outcome == 'success'
        continue-on-error: true
        run: |
          set +e
          flutter build apk --release > /tmp/buildlogs/release.log 2>&1
          EXIT=$?
          echo "## Release build exit: $EXIT" >> "$GITHUB_STEP_SUMMARY"
          tail -50 /tmp/buildlogs/release.log
          exit $EXIT

      - name: Upload build logs (always — for offline diagnosis)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: /tmp/buildlogs/
          if-no-files-found: warn
          retention-days: 7

      - name: Catalog build outputs (always)
        if: always()
        run: |
          echo "=== build/ tree (APKs only) ==="
          find build -name '*.apk' -exec ls -lh {} \; 2>/dev/null || echo "(no apks)"
          echo "=== build/app/outputs ==="
          find build/app/outputs -type d 2>/dev/null | head -20 || echo "(missing)"

      - name: Pick APK to publish (prefer release, fallback debug)
        id: pick
        run: |
          APK=""
          BUILD_KIND=""
          for candidate in \
              build/app/outputs/flutter-apk/app-release.apk \
              build/app/outputs/apk/release/app-release.apk \
              build/app/outputs/flutter-apk/app-debug.apk \
              build/app/outputs/apk/debug/app-debug.apk; do
            if [ -f "$candidate" ]; then
              APK="$candidate"
              case "$candidate" in
                *release*) BUILD_KIND="release" ;;
                *debug*) BUILD_KIND="debug" ;;
              esac
              break
            fi
          done
          if [ -z "$APK" ]; then
            echo "ERROR: no APK found anywhere" >&2
            find build -name '*.apk' 2>/dev/null || true
            exit 1
          fi
          TAG="${GITHUB_REF#refs/tags/}"
          # If triggered via workflow_dispatch, GITHUB_REF is a branch, not tag.
          if ! echo "$TAG" | grep -q '^v'; then
            TAG="manual-$(date +%Y%m%d-%H%M%S)"
          fi
          FRIENDLY="routinemon-${TAG}-${BUILD_KIND}.apk"
          cp "$APK" "$FRIENDLY"
          ls -lh "$FRIENDLY"
          echo "apk=$FRIENDLY" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "kind=$BUILD_KIND" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release + upload APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pick.outputs.tag }}
          name: ${{ steps.pick.outputs.tag }}
          generate_release_notes: true
          body: |
            ## 루틴몬 ${{ steps.pick.outputs.tag }}

            **APK 다운로드:** 아래 Assets 섹션의
            `${{ steps.pick.outputs.apk }}` 를 안드로이드 폰 브라우저로 직접 다운로드 후 설치하세요.

            - 빌드 종류: `${{ steps.pick.outputs.kind }}`
            - 미지원 출처 설치 허용 필요 (Settings → Apps → Special access → Install unknown apps)
          files: ${{ steps.pick.outputs.apk }}
          fail_on_unmatched_files: true

      - name: Upload APK as workflow artifact (always — for manual runs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pick.outputs.apk || 'apk-build-failed' }}
          path: ${{ steps.pick.outputs.apk }}
          if-no-files-found: warn
